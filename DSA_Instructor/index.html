<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="DSA Instructor Chatbot — Ask questions about Data Structures and Algorithms and get clear, concise explanations powered by AI.">
    <title>DSA Instructor — AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div class="header-text">
                    <h1>DSA Instructor</h1>
                    <span class="status-badge">
                        <span class="status-dot"></span>
                        AI Powered
                    </span>
                </div>
            </div>
            <button class="clear-btn" id="clearChat" title="Clear chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
            </button>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Welcome message -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h2>Welcome to DSA Instructor</h2>
                <p>Your AI-powered Data Structures & Algorithms tutor. Ask me anything about DSA!</p>
                <div class="suggestion-chips">
                    <button class="chip" data-query="What is a linked list and how does it differ from an array?">Linked
                        List vs Array</button>
                    <button class="chip" data-query="Explain Binary Search Tree with an example">Binary Search
                        Tree</button>
                    <button class="chip" data-query="What is the time complexity of QuickSort?">QuickSort
                        Complexity</button>
                    <button class="chip" data-query="Explain BFS and DFS graph traversal algorithms">BFS vs DFS</button>
                    <button class="chip"
                        data-query="What is dynamic programming? Explain with a simple example.">Dynamic
                        Programming</button>
                    <button class="chip" data-query="Explain the concept of a stack and its applications">Stack
                        Applications</button>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask me about Data Structures & Algorithms..." rows="1"
                    maxlength="2000"></textarea>
                <button class="send-btn" id="sendBtn" title="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="disclaimer">DSA Instructor can make mistakes. Verify important concepts.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
